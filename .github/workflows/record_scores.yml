name: Record Daily Scores

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 UTC 01:00（JST 10:00）
  workflow_dispatch:       # 手動実行も可能

jobs:
  record-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas fredapi requests

      - name: Record scores
        run: python record_scores.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add scores_history.json
          git diff --staged --quiet || git commit -m "Daily score update: $(date +%Y-%m-%d)"
          git push
